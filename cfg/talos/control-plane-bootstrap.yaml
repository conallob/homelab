machine:
  install:
    disk: /dev/mmcblk0
  nodeLabels:
    node-role.kubernetes.io/control-plane: ""
    kubernetes.io/arch: arm64
    node.kubernetes.io/soc: cm5
    node.kubernetes.io/ram: 16gb
    node.kubernetes.io/baseboard: cm4-io-base-b
    node.kubernetes.io/baseboard-manufacturer: waveshare
  network:
    nameservers:
      - 192.168.1.3
      - 192.168.6.1
      - 8.8.8.8
      - 1.1.1.1
    interfaces:
      - interface: end0
        dhcp: true
        vip:
          ip: 192.168.6.250
  time:
    servers:
      - 162.159.200.1
      - 162.159.200.123

cluster:
  allowSchedulingOnControlPlanes: true
  # Per https://docs.siderolabs.com/kubernetes-guides/cni/deploying-cilium
  network:
    cni:
      name: none
  proxy:
    disabled: true
